<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <!-- Dark rounded background -->
  <rect width="128" height="128" rx="24" fill="#141414"/>

  <!-- Terminal window frame -->
  <rect x="24" y="28" width="80" height="72" rx="8" fill="none" stroke="#e0e0e0" stroke-width="4"/>

  <!-- Terminal prompt: $ at top left -->
  <text x="34" y="52" font-family="ui-monospace, monospace" font-size="22" font-weight="600" fill="#e0e0e0">$</text>

  <!-- Paste icon at bottom right: CLIP_LG-style clipboard + 3 text lines (2x size) -->
  <g transform="translate(66, 54) scale(2.4)">
    <!-- Clipboard (same shape as CLIP_LG): body path + clip rect -->
    <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2" fill="#E57000" stroke="#c45f00" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="8" y="2" width="8" height="4" rx="1.5" fill="#E57000"/>
    <!-- Clip hole -->
    <rect x="9.5" y="3" width="5" height="2" rx="0.8" fill="#141414"/>
    <!-- 3 lines (text) -->
    <line x1="7" y1="11" x2="17" y2="11" stroke="#fff" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="7" y1="14" x2="17" y2="14" stroke="#fff" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="7" y1="17" x2="14" y2="17" stroke="#fff" stroke-width="1.2" stroke-linecap="round"/>
  </g>
</svg>
