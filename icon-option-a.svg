<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <!-- Dark rounded background -->
  <rect width="128" height="128" rx="24" fill="#141414"/>

  <!-- Clipboard body -->
  <rect x="28" y="30" width="72" height="70" rx="7" fill="none" stroke="#e0e0e0" stroke-width="5"/>

  <!-- Clipboard clip bar (orange) -->
  <rect x="42" y="16" width="44" height="22" rx="6" fill="#E57000"/>
  <!-- Clip hole -->
  <rect x="53" y="20" width="22" height="11" rx="4" fill="#141414"/>

  <!-- Text lines -->
  <line x1="42" y1="56" x2="86" y2="56" stroke="#e0e0e0" stroke-width="4.5" stroke-linecap="round" opacity="0.55"/>
  <line x1="42" y1="69" x2="86" y2="69" stroke="#e0e0e0" stroke-width="4.5" stroke-linecap="round" opacity="0.55"/>
  <line x1="42" y1="82" x2="69" y2="82" stroke="#e0e0e0" stroke-width="4.5" stroke-linecap="round" opacity="0.55"/>

  <!-- Orange paste arrow -->
  <circle cx="64" cy="102" r="10" fill="#E57000"/>
  <line x1="64" y1="96" x2="64" y2="105" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
  <polyline points="59,102 64,107 69,102" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

</svg>
