<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>PVE Paste Helper</title>
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        margin: 0;
        padding: 12px 14px;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 13px;
        background: #111;
        color: #eee;
        width: 280px;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 14px;
        font-weight: 600;
      }
      p {
        margin: 0 0 6px;
        line-height: 1.4;
      }
      code {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        font-size: 12px;
        background: #222;
        padding: 2px 4px;
        border-radius: 4px;
      }
      small {
        display: block;
        margin-top: 8px;
        font-size: 11px;
        color: #999;
      }
      .section {
        margin-top: 14px;
        padding-top: 12px;
        border-top: 1px solid #2a2a2a;
      }
      .section-title {
        font-size: 12px;
        font-weight: 600;
        color: #bbb;
        margin-bottom: 8px;
      }
      button {
        width: 100%;
        padding: 8px 12px;
        margin-bottom: 6px;
        font-size: 12px;
        font-family: inherit;
        background: #222;
        color: #eee;
        border: 1px solid #2a2a2a;
        border-radius: 8px;
        cursor: pointer;
        transition: background 0.15s, border-color 0.15s;
      }
      button:hover {
        background: #2a2a2a;
        border-color: #E57000;
      }
      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      button:last-of-type {
        margin-bottom: 0;
      }
      .hint {
        font-size: 11px;
        color: #666;
        margin-top: 6px;
      }
    </style>
  </head>
  <body>
    <h1>PVE Paste Helper</h1>
    <p>Open a PVE VM console (noVNC) and you&apos;ll see a paste panel in the bottom-right corner.</p>
    <p>Use your normal paste shortcut (<code>Ctrl+V</code> or <code>⌘V</code>) or the panel button to type text into the VM.</p>

    <div class="section">
      <div class="section-title">Snippets</div>
      <input type="file" id="import-file" accept=".json,application/json" hidden>
      <button type="button" id="export-btn">Export snippets</button>
      <button type="button" id="import-btn">Import snippets</button>
      <p class="hint" id="export-hint">Download all saved snippets as a JSON file.</p>
    </div>

    <small>Snippets you save stay on this device only.</small>

    <script src="popup.js"></script>
  </body>
</html>
