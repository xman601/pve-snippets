<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Import snippets – PVE Snippets</title>
    <link rel="icon" type="image/png" sizes="48x48" href="icons/icon48.png">
    <link rel="icon" type="image/png" sizes="16x16" href="icons/icon16.png">
    <style>
      :root {
        color-scheme: dark;
        --bg: #0d0d0d;
        --surface: #141414;
        --surface-alt: #0f0f0f;
        --surface2: #1c1c1c;
        --border: #272727;
        --border2: #353535;
        --text: #efefef;
        --text-muted: #606060;
        --accent: #ea580c;
        --accent-glow: rgba(234,88,12,0.08);
        --success: #22c55e;
        --error: #f87171;
        --radius: 8px;
        --radius-sm: 6px;
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 14px;
        background: var(--bg);
        color: var(--text);
        height: 100vh;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 32px 24px;
      }

      .page-wrapper {
        width: 100%;
        max-width: 680px;
        height: 100%;
        max-height: 860px;
        display: flex;
        flex-direction: column;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        overflow: hidden;
      }

      /* ── Header ──────────────────────────────────────────────── */
      .top-bar {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 14px 24px;
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
      }
      .brand-dot {
        width: 9px; height: 9px;
        border-radius: 50%;
        background: var(--accent);
        box-shadow: 0 0 10px var(--accent);
        flex-shrink: 0;
      }
      .brand-name {
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: var(--text-muted);
      }

      /* ── Upload banner ───────────────────────────────────────── */
      .upload-banner {
        border-bottom: 1px solid var(--border);
        padding: 18px 24px;
        flex-shrink: 0;
      }
      .upload-zone {
        position: relative;
        border: 1.5px dashed var(--border2);
        border-radius: var(--radius);
        padding: 22px 24px;
        display: flex;
        align-items: center;
        gap: 18px;
        cursor: pointer;
        transition: border-color 0.2s, background 0.2s;
        background: var(--bg);
      }
      .upload-zone:hover,
      .upload-zone.drag-over {
        border-color: var(--accent);
        background: var(--accent-glow);
      }
      .upload-zone input[type="file"] {
        position: absolute;
        inset: 0;
        opacity: 0;
        cursor: pointer;
        width: 100%;
        height: 100%;
      }
      .upload-zone-icon {
        width: 48px; height: 48px;
        background: rgba(234,88,12,0.12);
        border: 1px solid rgba(234,88,12,0.25);
        border-radius: var(--radius);
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }
      .upload-zone-icon svg { width: 22px; height: 22px; stroke: var(--accent); fill: none; }
      .upload-zone-text { flex: 1; }
      .upload-zone-label { font-size: 15px; font-weight: 600; margin-bottom: 3px; }
      .upload-zone-sub { font-size: 12px; color: var(--text-muted); }
      .upload-zone-sub span { color: var(--accent); font-weight: 500; }
      .upload-zone-btn {
        padding: 10px 20px;
        background: var(--accent);
        color: #fff;
        border-radius: var(--radius-sm);
        font-size: 13px;
        font-weight: 600;
        pointer-events: none;
        flex-shrink: 0;
      }

      /* ── Main scrollable area ────────────────────────────────── */
      .main-content {
        flex: 1;
        min-height: 0;
        overflow-y: auto;
        padding: 24px;
      }
      .main-content::-webkit-scrollbar { width: 4px; }
      .main-content::-webkit-scrollbar-track { background: transparent; }
      .main-content::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 99px; }
      .main-content::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

      /* ── Stat cards ──────────────────────────────────────────── */
      .stats-row {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 12px;
        margin-bottom: 28px;
      }
      .stat-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 16px;
        text-align: center;
        transition: border-color 0.2s;
      }
      .stat-card:hover { border-color: var(--accent); }
      .stat-value {
        font-size: 28px;
        font-weight: 700;
        color: var(--accent);
        margin-bottom: 4px;
        line-height: 1;
      }
      .stat-label {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--text-muted);
      }

      /* ── Snippets section header ─────────────────────────────── */
      .section-header {
        display: flex;
        align-items: center;
        margin-bottom: 12px;
        gap: 8px;
      }
      .section-title {
        font-size: 12px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.07em;
        color: var(--text-muted);
        flex: 1;
      }
      .snippets-count {
        font-size: 11px;
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 99px;
        padding: 2px 8px;
        color: var(--text-muted);
      }
      .export-btn {
        display: flex;
        align-items: center;
        gap: 5px;
        padding: 6px 12px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        font-size: 12px;
        font-weight: 600;
        color: var(--text-muted);
        cursor: pointer;
        font-family: inherit;
        transition: background 0.2s, border-color 0.2s, color 0.2s;
      }
      .export-btn:hover {
        background: var(--accent);
        border-color: var(--accent);
        color: #fff;
      }
      .export-btn svg { width: 13px; height: 13px; stroke: currentColor; fill: none; }

      /* ── Snippet list ────────────────────────────────────────── */
      .snippet-list { }
      .snippet-empty {
        padding: 32px;
        text-align: center;
        font-size: 13px;
        color: var(--text-muted);
        background: var(--surface);
        border: 1px dashed var(--border);
        border-radius: var(--radius);
      }

      /* Connected row style */
      .snippet-row {
        background: var(--surface);
        border: 1px solid var(--border);
        border-top: none;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 16px;
        transition: background 0.15s, border-color 0.15s;
        overflow: hidden;
      }
      .snippet-row:first-child {
        border-top: 1px solid var(--border);
        border-radius: var(--radius) var(--radius) 0 0;
      }
      .snippet-row:last-child {
        border-radius: 0 0 var(--radius) var(--radius);
      }
      .snippet-row:only-child {
        border-radius: var(--radius);
        border-top: 1px solid var(--border);
      }
      .snippet-row:nth-child(odd) { background: var(--surface-alt); }
      .snippet-row:hover { background: var(--surface2); border-color: var(--border2); }
      .snippet-row:hover + .snippet-row { border-top-color: var(--border2); }
      .snippet-row.editing { background: var(--surface2); border-color: var(--accent) !important; }

      .snippet-info { flex: 1; min-width: 0; }
      .snippet-name {
        font-size: 13px;
        font-weight: 500;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        margin-bottom: 3px;
      }
      .snippet-preview {
        font-size: 11px;
        color: var(--text-muted);
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .snippet-actions {
        display: flex;
        gap: 8px;
        margin-left: 16px;
        flex-shrink: 0;
      }
      .row-btn {
        background: none;
        border: none;
        cursor: pointer;
        padding: 4px;
        display: flex;
        align-items: center;
        opacity: 0.5;
        transition: opacity 0.15s, transform 0.15s;
      }
      .row-btn svg { width: 16px; height: 16px; stroke: currentColor; fill: none; }
      .row-btn:hover { opacity: 1; transform: scale(1.1); }
      .row-btn.del { color: var(--error); }

      /* Edit form */
      .snippet-edit {
        display: none;
        padding: 12px 16px;
        border-top: 1px solid var(--border);
        gap: 8px;
        flex-direction: column;
        background: var(--surface2);
      }
      .snippet-row.editing .snippet-edit { display: flex; }
      .edit-field { display: flex; flex-direction: column; gap: 4px; }
      .edit-label {
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.07em;
        color: var(--text-muted);
      }
      .edit-input, .edit-textarea {
        width: 100%;
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        color: var(--text);
        font-family: inherit;
        font-size: 13px;
        padding: 7px 10px;
        outline: none;
        transition: border-color 0.15s;
      }
      .edit-input:focus, .edit-textarea:focus { border-color: var(--accent); }
      .edit-textarea {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 12px;
        resize: vertical;
        min-height: 68px;
        line-height: 1.5;
      }
      .edit-actions { display: flex; gap: 6px; justify-content: flex-end; }
      .edit-btn {
        padding: 6px 14px;
        border-radius: var(--radius-sm);
        font-size: 12px;
        font-weight: 500;
        cursor: pointer;
        border: 1px solid var(--border);
        font-family: inherit;
        transition: opacity 0.15s, background 0.15s;
      }
      .edit-btn-save { background: var(--accent); color: #fff; border-color: var(--accent); }
      .edit-btn-save:hover { opacity: 0.88; }
      .edit-btn-cancel { background: var(--surface); color: var(--text-muted); }
      .edit-btn-cancel:hover { color: var(--text); }

      /* ── Footer ──────────────────────────────────────────────── */
      .page-footer {
        border-top: 1px solid var(--border);
        padding: 10px 24px 12px;
        display: flex;
        align-items: center;
        gap: 8px;
        flex-shrink: 0;
      }
      .status-dot {
        width: 7px; height: 7px;
        border-radius: 50%;
        background: var(--border);
        flex-shrink: 0;
        transition: background 0.25s, box-shadow 0.25s;
      }
      .status-dot.success { background: var(--success); box-shadow: 0 0 6px var(--success); }
      .status-dot.error   { background: var(--error);   box-shadow: 0 0 6px var(--error); }
      #status {
        font-size: 12px;
        color: var(--text-muted);
        flex: 1;
        line-height: 1.4;
      }
      #status.success { color: var(--success); }
      #status.error   { color: var(--error); }
      .footer-links {
        font-size: 11px;
        color: var(--text-muted);
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .footer-links a {
        color: var(--accent);
        text-decoration: none;
      }
      .footer-links a:hover { text-decoration: underline; }
      .footer-sep { color: var(--border2); }
    </style>
  </head>
  <body>
  <div class="page-wrapper">

    <!-- Header -->
    <div class="top-bar">
      <div class="brand-dot"></div>
      <span class="brand-name">PVE Snippets</span>
    </div>

    <!-- Upload zone -->
    <div class="upload-banner">
      <div class="upload-zone" id="dropZone">
        <input type="file" id="file" accept=".json,application/json">
        <div class="upload-zone-icon">
          <svg viewBox="0 0 24 24" stroke-width="1.8" xmlns="http://www.w3.org/2000/svg">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0
                 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5"/>
          </svg>
        </div>
        <div class="upload-zone-text">
          <div class="upload-zone-label">Import a backup</div>
          <div class="upload-zone-sub">Drop a <span>.json</span> file or <span>click to browse</span></div>
        </div>
        <div class="upload-zone-btn">Choose file</div>
      </div>
    </div>

    <!-- Main content -->
    <div class="main-content">

      <!-- Stat cards -->
      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-value" id="statTotal">0</div>
          <div class="stat-label">Total Snippets</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="statRecent">—</div>
          <div class="stat-label">Last Updated</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="statSize">0 B</div>
          <div class="stat-label">Storage Used</div>
        </div>
      </div>

      <!-- Snippets section -->
      <div class="section-header">
        <span class="section-title">Your snippets</span>
        <span class="snippets-count" id="snippetCount">0</span>
        <button class="export-btn" id="exportBtn" type="button">
          <svg viewBox="0 0 24 24" stroke-width="1.8" xmlns="http://www.w3.org/2000/svg">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0
                 0021 18.75V16.5M16.5 12L12 16.5m0 0L7.5 12m4.5 4.5V3"/>
          </svg>
          Export all
        </button>
      </div>

      <div class="snippet-list" id="snippetList">
        <div class="snippet-empty">No snippets yet — import a backup or add snippets from the extension popup.</div>
      </div>

    </div>

    <!-- Footer -->
    <div class="page-footer">
      <div class="status-dot" id="statusDot"></div>
      <span id="status">Ready · Data stays on this device.</span>
      <div class="footer-links">
        <span id="version-label"></span>
        <span class="footer-sep">·</span>
        <a href="https://github.com/xman601/pve-snippets" target="_blank" rel="noopener noreferrer">GitHub</a>
        <span class="footer-sep">·</span>
        <a href="https://github.com/xman601/pve-snippets/blob/main/docs/PRIVACY_POLICY.md" target="_blank" rel="noopener noreferrer">Privacy</a>
      </div>
    </div>

    <script src="snippets-manager.js"></script>
    <script src="import.js"></script>
  </div>
  </body>
</html>
