<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>PVE Snippets</title>
    <style>
      /* Match noVNC panel theme (content.js THEME) */
      :root {
        color-scheme: dark;
        --pmx-bg: #141414;
        --pmx-bgPanel: #1a1a1a;
        --pmx-border: #2a2a2a;
        --pmx-text: #fff;
        --pmx-textMuted: #8a8a8a;
        --pmx-accent: #f60;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        padding: 0;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        font-size: 12px;
        background: var(--pmx-bgPanel);
        color: var(--pmx-text);
        width: 380px;
        min-height: 400px;
        max-height: 520px;
        display: flex;
        flex-direction: column;
        -webkit-font-smoothing: antialiased;
      }

      /* Tab header (like #pmx-header) */
      .pmx-header {
        display: flex;
        align-items: stretch;
        background: var(--pmx-bg);
        border-bottom: 1px solid var(--pmx-border);
        border-radius: 6px 6px 0 0;
        overflow: hidden;
        flex-shrink: 0;
      }
      .pmx-tabs { display: flex; align-items: stretch; flex: 1; }
      .pmx-tab {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 7px;
        padding: 13px 10px 11px;
        background: transparent;
        border: none;
        border-bottom: 2px solid transparent;
        margin-bottom: -1px;
        font-family: inherit;
        font-size: 11px;
        font-weight: 500;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--pmx-textMuted);
        cursor: pointer;
        transition: color 0.15s, border-color 0.15s;
        -webkit-appearance: none;
        appearance: none;
      }
      .pmx-tab + .pmx-tab { border-left: 1px solid var(--pmx-border); }
      .pmx-tab:hover { color: var(--pmx-textMuted); }
      .pmx-tab.active { color: var(--pmx-text); border-bottom-color: var(--pmx-accent); }

      /* Views */
      .pmx-view {
        display: none;
        flex-direction: column;
        flex: 1;
        min-height: 0;
      }
      .pmx-view.active { display: flex; }

      /* Paste view – textarea fills remaining space */
      .pmx-paste-view #pmx-textarea {
        flex: 1;
        min-height: 0;
        width: 100%;
        background: transparent;
        border: none;
        outline: none;
        resize: none;
        font-family: inherit;
        font-size: 12px;
        color: var(--pmx-textMuted);
        padding: 11px 12px;
        display: block;
        caret-color: var(--pmx-accent);
      }
      .pmx-paste-view #pmx-textarea::placeholder { color: var(--pmx-textMuted); }

      .pmx-footer {
        padding: 8px 10px;
        border-top: 1px solid var(--pmx-border);
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 6px;
        flex-shrink: 0;
      }
      .pmx-footer-btns { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }

      .pmx-save-snip-btn {
        background: transparent;
        border: 1px solid var(--pmx-border);
        border-radius: 4px;
        color: var(--pmx-textMuted);
        font-family: inherit;
        font-size: 9px;
        font-weight: 500;
        letter-spacing: 0.08em;
        padding: 5px 10px;
        cursor: pointer;
        white-space: nowrap;
        transition: border-color 0.12s, color 0.12s;
        -webkit-appearance: none;
        appearance: none;
      }
      .pmx-save-snip-btn:hover { border-color: var(--pmx-accent); color: var(--pmx-accent); }

      .pmx-send {
        background: var(--pmx-accent);
        color: var(--pmx-text);
        border: none;
        border-radius: 4px;
        font-family: inherit;
        font-size: 9px;
        font-weight: 500;
        letter-spacing: 0.08em;
        padding: 5px 12px;
        cursor: pointer;
        white-space: nowrap;
        transition: background 0.12s;
        -webkit-appearance: none;
        appearance: none;
      }
      .pmx-send:hover { opacity: 0.9; }

      .pmx-clear-btn {
        background: transparent;
        border: 1px solid var(--pmx-border);
        border-radius: 4px;
        color: var(--pmx-textMuted);
        font-family: inherit;
        font-size: 9px;
        font-weight: 500;
        letter-spacing: 0.06em;
        padding: 5px 10px;
        cursor: pointer;
        white-space: nowrap;
        transition: border-color 0.12s, color 0.12s;
        -webkit-appearance: none;
        appearance: none;
      }
      .pmx-clear-btn:hover { border-color: var(--pmx-accent); color: var(--pmx-accent); }

      .pmx-paste-hint {
        font-size: 9px;
        color: var(--pmx-textMuted);
        flex: 1;
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      /* Snippets view */
      .pmx-snip-scroll {
        max-height: 220px;
        overflow-y: auto;
        padding: 8px;
        display: flex;
        flex-direction: column;
        gap: 4px;
        flex: 1;
        min-height: 0;
      }
      .pmx-snip-scroll::-webkit-scrollbar { width: 4px; }
      .pmx-snip-scroll::-webkit-scrollbar-thumb { background: var(--pmx-border); border-radius: 2px; }

      .pmx-snip-row {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 10px;
        border-radius: 4px;
        border: 1px solid var(--pmx-border);
        background: var(--pmx-bg);
        transition: border-color 0.12s, background 0.12s;
      }
      .pmx-snip-row:hover { border-color: var(--pmx-border); background: var(--pmx-bgPanel); }

      .pmx-snip-info { flex: 1; min-width: 0; }
      .pmx-snip-name {
        font-size: 10px;
        color: var(--pmx-accent);
        letter-spacing: 0.08em;
        text-transform: uppercase;
        margin-bottom: 3px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .pmx-snip-preview {
        font-size: 10px;
        color: var(--pmx-textMuted);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .pmx-snip-actions {
        flex-shrink: 0;
        display: flex;
        align-items: center;
        gap: 4px;
      }
      .pmx-snip-actions button {
        height: 24px;
        min-height: 24px;
        box-sizing: border-box;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-family: inherit;
        cursor: pointer;
        -webkit-appearance: none;
        appearance: none;
      }
      .pmx-snip-send {
        background: var(--pmx-accent);
        border: none;
        border-radius: 4px;
        color: var(--pmx-text);
        font-size: 9px;
        padding: 0 9px;
      }
      .pmx-snip-edit {
        background: transparent;
        border: 1px solid var(--pmx-border);
        border-radius: 3px;
        color: var(--pmx-textMuted);
        padding: 0;
        width: 24px;
        transition: border-color 0.12s, color 0.12s;
      }
      .pmx-snip-edit:hover { border-color: var(--pmx-accent); color: var(--pmx-accent); }
      .pmx-snip-del {
        background: transparent;
        border: none;
        color: var(--pmx-textMuted);
        font-size: 14px;
        padding: 0;
        width: 28px;
        transition: color 0.12s;
      }
      .pmx-snip-del:hover { color: var(--pmx-accent); }

      .pmx-snip-empty {
        padding: 24px 12px;
        text-align: center;
        font-size: 10px;
        color: var(--pmx-textMuted);
        line-height: 1.7;
      }

      .pmx-snip-footer {
        padding: 9px 12px;
        border-top: 1px solid var(--pmx-border);
        background: var(--pmx-bg);
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 10px;
        flex-shrink: 0;
      }
      .pmx-snip-footer-inner { min-width: 0; }
      .pmx-snip-hint { font-size: 9px; color: var(--pmx-textMuted); letter-spacing: 0.08em; }
      .pmx-snip-new-btn {
        background: var(--pmx-accent);
        border: none;
        border-radius: 4px;
        color: var(--pmx-text);
        font-size: 11px;
        font-weight: 600;
        padding: 7px 12px;
        cursor: pointer;
        white-space: nowrap;
        transition: background 0.12s;
        -webkit-appearance: none;
        appearance: none;
      }
      .pmx-snip-new-btn:hover { opacity: 0.9; }
      .pmx-snip-footer-btn-secondary {
        background: transparent;
        border: 1px solid var(--pmx-border);
        color: var(--pmx-textMuted);
        font-size: 10px;
        padding: 5px 10px;
      }
      .pmx-snip-footer-btn-secondary:hover { border-color: var(--pmx-accent); color: var(--pmx-accent); }
      .pmx-snip-footer-links {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 10px;
      }
      .pmx-snip-footer-links a {
        color: var(--pmx-textMuted);
        text-decoration: none;
      }
      .pmx-snip-footer-links a:hover { color: var(--pmx-accent); }

      /* Add/Edit form */
      .pmx-snippet-form {
        padding: 10px;
        margin: 0 8px 8px;
        background: var(--pmx-bg);
        border: 1px solid var(--pmx-border);
        border-radius: 4px;
        display: none;
      }
      .pmx-snippet-form.open { display: block; }
      .pmx-snippet-form .form-row { margin-bottom: 8px; }
      .pmx-snippet-form .form-row:last-of-type { margin-bottom: 10px; }
      .pmx-snippet-form label {
        display: block;
        font-size: 9px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--pmx-textMuted);
        margin-bottom: 4px;
      }
      .pmx-snippet-form input,
      .pmx-snippet-form textarea {
        width: 100%;
        padding: 6px 8px;
        font-size: 11px;
        font-family: inherit;
        background: var(--pmx-bgPanel);
        border: 1px solid var(--pmx-border);
        border-radius: 4px;
        color: var(--pmx-text);
      }
      .pmx-snippet-form textarea {
        min-height: 56px;
        resize: vertical;
      }
      .pmx-snippet-form .form-actions { display: flex; gap: 6px; justify-content: flex-end; }
      .pmx-snippet-form .form-actions button {
        padding: 5px 10px;
        font-size: 9px;
        font-family: inherit;
        border-radius: 4px;
        cursor: pointer;
        -webkit-appearance: none;
        appearance: none;
      }
      .pmx-snippet-form .form-actions .save {
        background: var(--pmx-accent);
        color: var(--pmx-text);
        border: none;
      }
      .pmx-snippet-form .form-actions .cancel {
        background: transparent;
        color: var(--pmx-textMuted);
        border: 1px solid var(--pmx-border);
      }

      /* Popup footer (version + links) */
      .popup-footer {
        padding: 8px 12px;
        border-top: 1px solid var(--pmx-border);
        font-size: 9px;
        color: var(--pmx-textMuted);
        display: flex;
        align-items: center;
        gap: 8px;
        flex-shrink: 0;
      }
      .popup-footer a {
        color: var(--pmx-textMuted);
        text-decoration: none;
      }
      .popup-footer a:hover { color: var(--pmx-accent); }

      /* Command palette header */
      .cp-title-bar {
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        padding: 12px 14px 10px;
        border-bottom: 1px solid var(--pmx-border);
        flex-shrink: 0;
      }
      .cp-settings-btn {
        position: absolute;
        top: 50%;
        right: 8px;
        transform: translateY(-50%);
        width: 28px;
        height: 28px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: none;
        border: none;
        border-radius: 4px;
        color: var(--pmx-textMuted);
        cursor: pointer;
        -webkit-appearance: none;
        appearance: none;
        transition: color 0.15s, background 0.15s;
      }
      .cp-settings-btn:hover {
        color: var(--pmx-accent);
        background: var(--pmx-bg);
      }
      .cp-settings-btn svg { width: 16px; height: 16px; display: block; }
      .cp-title {
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--pmx-textMuted);
      }
      .cp-search-wrap {
        padding: 8px 12px 6px;
        border-bottom: 1px solid var(--pmx-border);
        flex-shrink: 0;
      }
      .cp-search {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 10px;
        background: var(--pmx-bg);
        border: 1px solid var(--pmx-border);
        border-radius: 4px;
      }
      .cp-search:focus-within { border-color: var(--pmx-accent); outline: none; }
      .cp-search-icon {
        flex-shrink: 0;
        color: var(--pmx-textMuted);
      }
      .cp-search-icon svg { width: 14px; height: 14px; display: block; }
      .cp-search input {
        flex: 1;
        min-width: 0;
        background: none;
        border: none;
        outline: none;
        font-family: inherit;
        font-size: 12px;
        color: var(--pmx-text);
      }
      .cp-search input::placeholder { color: var(--pmx-textMuted); }

      /* Tabs below search */
      .pmx-header { border-radius: 0; }
      .pmx-tab { padding: 10px 12px; }

      /* Snippet row: numbered, left accent on active */
      .pmx-snip-row {
        padding: 10px 12px 10px 10px;
        gap: 10px;
        border-radius: 0;
        border: none;
        border-left: 3px solid transparent;
        background: var(--pmx-bg);
      }
      .pmx-snip-row:hover,
      .pmx-snip-row.active {
        background: var(--pmx-bgPanel);
        border-left-color: var(--pmx-accent);
      }
      .pmx-snip-num {
        flex-shrink: 0;
        font-size: 10px;
        font-weight: 500;
        color: var(--pmx-textMuted);
        width: 20px;
        text-align: right;
      }
      .pmx-snip-send { font-size: 9px; font-weight: 600; letter-spacing: 0.06em; padding: 0 10px; }
      .pmx-snip-edit { width: 26px; }
      .pmx-snip-edit svg { width: 10px; height: 10px; }
      .pmx-snip-del { width: 26px; font-size: 12px; }

      .pmx-snip-footer-left {
        font-size: 9px;
        color: var(--pmx-textMuted);
        letter-spacing: 0.06em;
      }
      .pmx-snip-footer-left a { color: var(--pmx-textMuted); text-decoration: none; }
      .pmx-snip-footer-left a:hover { color: var(--pmx-accent); }
      .pmx-snip-new-btn { font-size: 10px; font-weight: 600; letter-spacing: 0.08em; padding: 6px 12px; }
    </style>
  </head>
  <body>
    <div class="cp-title-bar">
      <span class="cp-title">PVE Snippets</span>
      <a href="#" id="cp-settings-btn" class="cp-settings-btn" title="Settings" aria-label="Settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </a>
    </div>
    <header class="pmx-header">
      <div class="pmx-tabs">
        <button type="button" class="pmx-tab active" id="tab-paste" data-tab="paste">Paste</button>
        <button type="button" class="pmx-tab" id="tab-snippets" data-tab="snippets">Snippets</button>
      </div>
    </header>

    <div id="view-paste" class="pmx-view active pmx-paste-view">
      <textarea id="pmx-textarea" placeholder="Type or paste text, then click Send…" rows="5"></textarea>
      <div class="pmx-footer">
        <span class="pmx-paste-hint" id="popup-paste-hint"></span>
        <div class="pmx-footer-btns">
          <button type="button" class="pmx-clear-btn" id="popup-clear-btn">Clear</button>
          <button type="button" class="pmx-save-snip-btn" id="popup-save-as-snippet-btn">Save as snippet</button>
          <button type="button" class="pmx-send" id="popup-send-btn">Send</button>
        </div>
      </div>
    </div>

    <div id="view-snippets" class="pmx-view">
      <div class="cp-search-wrap" id="cp-search-wrap">
        <div class="cp-search">
          <span class="cp-search-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          </span>
          <input type="text" id="cp-search-input" placeholder="Search snippets..." autocomplete="off" />
        </div>
      </div>
      <div id="popup-snippet-list" class="pmx-snip-scroll" aria-label="Snippet list"></div>
      <div id="popup-snippet-form" class="pmx-snippet-form">
        <div class="form-row">
          <label for="popup-snippet-name">Name</label>
          <input type="text" id="popup-snippet-name" placeholder="Snippet name" />
        </div>
        <div class="form-row">
          <label for="popup-snippet-text">Content</label>
          <textarea id="popup-snippet-text" placeholder="Paste or type content…"></textarea>
        </div>
        <div class="form-actions">
          <button type="button" class="cancel" id="popup-snippet-form-cancel">Cancel</button>
          <button type="button" class="save" id="popup-snippet-form-save">Save</button>
        </div>
      </div>
      <div class="pmx-snip-footer">
        <button type="button" class="pmx-snip-new-btn" id="popup-new-snippet-btn">+ New snippet</button>
      </div>
    </div>

    <footer class="popup-footer">
      <span id="version-label"></span>
      <a href="https://github.com/xman601/pve-snippets" target="_blank" rel="noopener noreferrer">GitHub</a>
      <a href="https://github.com/xman601/pve-snippets/blob/main/docs/PRIVACY_POLICY.md" target="_blank" rel="noopener noreferrer">Privacy</a>
    </footer>

    <script src="popup.js"></script>
  </body>
</html>
