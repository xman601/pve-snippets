<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>PVE Paste Helper</title>
    <style>
      :root {
        color-scheme: dark;
        --popup-bg: #0d0d0d;
        --popup-surface: #161616;
        --popup-surface-hover: #1e1e1e;
        --popup-border: #2d2d2d;
        --popup-text: #e8e8e8;
        --popup-text-muted: #737373;
        --popup-accent: #ea580c;
        --popup-accent-hover: #f97316;
        --popup-radius: 10px;
        --popup-radius-sm: 6px;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        padding: 0;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 13px;
        background: var(--popup-bg);
        color: var(--popup-text);
        width: 300px;
        min-height: 320px;
      }

      .header {
        padding: 14px 16px 10px;
        border-bottom: 1px solid var(--popup-border);
      }
      .header h1 {
        margin: 0;
        font-size: 15px;
        font-weight: 600;
        letter-spacing: -0.02em;
      }
      .header p {
        margin: 6px 0 0;
        font-size: 12px;
        color: var(--popup-text-muted);
        line-height: 1.4;
      }
      .header code {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        font-size: 11px;
        background: var(--popup-surface);
        padding: 2px 5px;
        border-radius: 4px;
        color: var(--popup-text-muted);
      }

      /* Primary: Paste into page */
      .paste-card {
        margin: 12px 16px;
        padding: 12px;
        background: var(--popup-surface);
        border: 1px solid var(--popup-border);
        border-radius: var(--popup-radius);
      }
      .paste-card .label {
        display: block;
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--popup-text-muted);
        margin-bottom: 8px;
      }
      #popup-paste-text {
        width: 100%;
        margin: 0 0 10px;
        padding: 10px 12px;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        font-size: 12px;
        line-height: 1.45;
        background: var(--popup-bg);
        color: var(--popup-text);
        border: 1px solid var(--popup-border);
        border-radius: var(--popup-radius-sm);
        resize: vertical;
        min-height: 72px;
      }
      #popup-paste-text::placeholder {
        color: var(--popup-text-muted);
      }
      #popup-paste-text:focus {
        outline: none;
        border-color: var(--popup-accent);
      }
      #popup-send-btn {
        width: 100%;
        padding: 10px 14px;
        font-size: 13px;
        font-weight: 500;
        background: var(--popup-accent);
        color: #fff;
        border: none;
        border-radius: var(--popup-radius-sm);
        cursor: pointer;
        transition: background 0.15s;
      }
      #popup-send-btn:hover {
        background: var(--popup-accent-hover);
      }
      #popup-send-btn:active {
        transform: scale(0.99);
      }
      #popup-paste-hint {
        display: block;
        font-size: 11px;
        color: var(--popup-text-muted);
        margin-top: 8px;
        line-height: 1.35;
      }

      /* Options */
      .options {
        padding: 0 16px 12px;
      }
      .option-row {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 12px;
        background: var(--popup-surface);
        border: 1px solid var(--popup-border);
        border-radius: var(--popup-radius-sm);
        cursor: pointer;
        font-size: 13px;
        margin-bottom: 6px;
      }
      .option-row:hover {
        background: var(--popup-surface-hover);
      }
      .option-row:last-of-type {
        margin-bottom: 0;
      }
      .option-row input[type="checkbox"] {
        margin: 0;
        cursor: pointer;
        accent-color: var(--popup-accent);
      }

      /* Snippets */
      .section {
        padding: 12px 16px;
        border-top: 1px solid var(--popup-border);
      }
      .section-title {
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--popup-text-muted);
        margin-bottom: 8px;
      }
      .btn-row {
        display: flex;
        gap: 8px;
      }
      .btn-row button {
        flex: 1;
        padding: 8px 12px;
        font-size: 12px;
        font-family: inherit;
        background: var(--popup-surface);
        color: var(--popup-text);
        border: 1px solid var(--popup-border);
        border-radius: var(--popup-radius-sm);
        cursor: pointer;
        transition: background 0.15s, border-color 0.15s;
      }
      .btn-row button:hover {
        background: var(--popup-surface-hover);
        border-color: var(--popup-accent);
      }
      #export-hint {
        font-size: 11px;
        color: var(--popup-text-muted);
        margin-top: 8px;
      }

      /* Footer */
      .popup-footer {
        margin-top: auto;
        padding: 10px 16px 14px;
        border-top: 1px solid var(--popup-border);
        font-size: 11px;
        color: var(--popup-text-muted);
        line-height: 1.5;
      }
      .popup-footer a {
        color: var(--popup-accent);
        text-decoration: none;
      }
      .popup-footer a:hover {
        text-decoration: underline;
      }
      #version-label {
        display: block;
        margin-bottom: 4px;
      }
    </style>
  </head>
  <body>
    <header class="header">
      <h1>PVE Paste Helper</h1>
      <p>Paste into noVNC or any page. On PVE consoles use <code>Ctrl+V</code> / <code>⌘V</code> or the panel.</p>
    </header>

    <main class="paste-card">
      <span class="label">Paste into page</span>
      <textarea id="popup-paste-text" placeholder="Type or paste text, then send to the active tab…" rows="3"></textarea>
      <button type="button" id="popup-send-btn">Paste into page</button>
      <span class="hint" id="popup-paste-hint">Sends to the active tab (noVNC or focused field).</span>
    </main>

    <div class="options">
      <label class="option-row">
        <input type="checkbox" id="auto-enter" />
        <span>Auto-hit Enter after paste</span>
      </label>
    </div>

    <div class="section">
      <div class="section-title">Snippets</div>
      <div class="btn-row">
        <button type="button" id="export-btn">Export</button>
        <button type="button" id="import-btn">Import</button>
      </div>
      <p class="hint" id="export-hint">Download or import saved snippets. Import opens in a new tab.</p>
    </div>

    <footer class="popup-footer">
      <span id="version-label"></span>
      <a href="https://github.com/xman601/pve-snippets" target="_blank" rel="noopener noreferrer">GitHub</a>
      &middot;
      <a href="https://github.com/xman601/pve-snippets/blob/main/docs/PRIVACY_POLICY.md" target="_blank" rel="noopener noreferrer">Privacy</a>
      <br>
      <small>Data stays on this device.</small>
    </footer>

    <script src="popup.js"></script>
  </body>
</html>
